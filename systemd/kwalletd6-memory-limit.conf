[Service]
# Kill kwalletd6 if it exceeds 1 GiB RAM + 500 MiB swap to prevent
# system-wide OOM from KDE Bug 522615 (kwalletd6 memory leak).
# The KDE Watchdog will automatically restart it.
# Deploy to: ~/.config/systemd/user/dbus-:1.2-org.kde.kwalletd6@.service.d/memory-limit.conf
MemoryMax=1G
MemorySwapMax=500M
