# SSH Hardening - Secure Remote Access (phone -> PC)
# Deployed to: /etc/ssh/sshd_config.d/99-hardening.conf
# Restart:     sudo systemctl restart sshd
#
# Key-only authentication. Password + root login are disabled to make
# brute-force impossible. Pair with Tailscale (see docs/remote-access.md)
# so NO port is ever exposed to the public internet.
#
# WARNING: PasswordAuthentication is set to 'no'. Add your phone's public
# key to ~/.ssh/authorized_keys BEFORE relying on this, or you will only be
# able to log in from the physical console.

# --- Authentication ---
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
AuthenticationMethods publickey
PermitEmptyPasswords no
MaxAuthTries 3
LoginGraceTime 20

# --- Restrict who can log in (uncomment and set your username) ---
#AllowUsers YOUR_USER

# --- Reduce attack surface ---
X11Forwarding no
AllowAgentForwarding no

# --- Drop dead/idle sessions (mobile networks flap often) ---
ClientAliveInterval 300
ClientAliveCountMax 2
