# earlyoom configuration - Proactive OOM Prevention
# Deployed to: /etc/default/earlyoom
# Service:     systemctl enable --now earlyoom
#
# -m 15:  Send SIGTERM when available RAM drops below 15%
# -s 15:  Send SIGTERM when available swap drops below 15%
# -r 3600: Print memory report every hour
# --prefer: Kill these high-memory processes first (chrome, java, kwalletd6, etc.)
# --avoid:  Never kill system-critical processes
# -n:      Run in foreground (managed by systemd)

EARLYOOM_ARGS="-m 15 -s 15 -r 3600 --avoid (^|/)(init|systemd|Xorg|ssh|login)$ --prefer (^|/)(chrome|java|kwalletd6|firefox|gradle)$ -n"
